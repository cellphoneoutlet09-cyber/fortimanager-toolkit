name: Python CI

on: [push, pull_request]

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests flake8 bandit

      - name: Lint with flake8
        run: flake8 . --max-line-length=100 --exit-zero

      - name: Security scan with bandit
        run: bandit -r . --exit-zero

      - name: Compile check
        run: python -m py_compile fmg_pull.py
